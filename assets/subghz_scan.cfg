# Sub-GHz Scanner Configuration
# Place this file as /scripts/subghz_scan.cfg on microSD card
# All values are optional - defaults will be used if not specified

# Scan frequency range in MHz (300-928 MHz supported)
start_mhz=430.0
end_mhz=440.0

# Step size between frequencies in MHz (minimum 0.1)
step_mhz=0.5

# Receive timeout per frequency in milliseconds
timeout_ms=1000

# Log format for captured packets: hex, base64, or both
log_format=both