[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

src_dir = main
include_dir = main/firmware/include

build_flags =
  -I main/firmware/include
  -I main/core/logging
  -I main/core/menu
  -I main/core/automation
  -I main/core/module_manager
  -I main/core/ui
  -I main/core/storage
  -I main/apps/system
  -I main/apps/wifi
  -I main/apps/gpio
  -I main/apps/ble
  -I main/apps/logs
  -I main/apps/settings
  -I main/core/events
  -I main/core/status
  -I main/apps/diagnostics
  -I main/apps/uart
  -I main/core/registry
  -I main/core/shell
  -I main/apps/health
  -I main/apps/system
  -I main/apps/gpio
  -I main/apps/wifi
  -I main/core/input
  -I main/core/navigation
  -I main/core/display
  -I main/core/screens