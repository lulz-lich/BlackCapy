[platformio]
src_dir = main
include_dir = main/firmware/include

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
lib_deps =
  crankyoldgit/IRremoteESP8266
  adafruit/Adafruit PN532
  miguelbalboa/MFRC522
  mikalhart/TinyGPSPlus
  jgromes/RadioLib
  autowp/autowp-mcp2515

build_flags =
  -I main/firmware/include
  -I main/core/app_contract
  -I main/core/ai
  -I main/core/app_manager
  -I main/core/automation
  -I main/core/capture
  -I main/core/display
  -I main/core/events
  -I main/core/filesystem
  -I main/core/input
  -I main/core/logging
  -I main/core/menu
  -I main/core/module_manager
  -I main/core/module_manifest
  -I main/core/screens
  -I main/core/shell
  -I main/core/status
  -I main/core/storage
  -I main/core/storage_policy
  -I main/core/ui
  -I main/core/ui_controller
  -I main/apps/ble
  -I main/apps/ai
  -I main/apps/can
  -I main/apps/captures
  -I main/apps/diagnostics
  -I main/apps/gpio
  -I main/apps/gps
  -I main/apps/health
  -I main/apps/ir
  -I main/apps/logs
  -I main/apps/lora
  -I main/apps/modules
  -I main/apps/nfc
  -I main/apps/rf
  -I main/apps/rfid
  -I main/apps/settings
  -I main/apps/storage
  -I main/apps/system
  -I main/apps/uart
  -I main/apps/wifi
